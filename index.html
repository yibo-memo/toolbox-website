<script>
// Tool data
const tools = [
  // 文本工具
  {name:"JSON格式化",desc:"美化、压缩、校验JSON数据，支持语法高亮",cat:"text",icon:"📄",color:"ti-purple",url:"tools/json.html"},
  {name:"字数统计",desc:"统计文本字符数、词数、行数、段落数",cat:"text",icon:"🔢",color:"ti-blue",url:"tools/word-count.html"},

  {name:"Unix时间戳",desc:"时间戳与日期时间互相转换",cat:"dev",icon:"⏱️",color:"ti-amber",url:"tools/timestamp.html"},
  {name:"HTTP状态码",desc:"查询HTTP状态码的含义和说明",cat:"dev",icon:"🌐",color:"ti-sky",url:"tools/http-codes.html"},
  // 转换工具
  {name:"颜色转换",desc:"HEX、RGB、HSL颜色值互相转换，可视化取色",cat:"convert",icon:"🎨",color:"ti-pink",url:"tools/color-convert.html"},
  {name:"进制转换",desc:"二进制、八进制、十进制、十六进制互相转换",cat:"convert",icon:"🔢",color:"ti-blue",url:"tools/radix-convert.html"},
  {name:"单位换算",desc:"长度、重量、温度、面积等常用单位换算",cat:"convert",icon:"📏",color:"ti-green",url:"tools/unit-convert.html"},
  {name:"Base64编解码",desc:"文本与Base64编码互相转换",cat:"convert",icon:"🔐",color:"ti-red",url:"tools/base64.html"},
  // 图片工具
  {name:"图片压缩",desc:"在线压缩图片文件大小，支持JPG/PNG/WebP",cat:"image",icon:"🖼️",color:"ti-orange",url:"tools/image-compress.html"},
  {name:"图片格式转换",desc:"JPG、PNG、WebP、BMP等格式互相转换",cat:"image",icon:"🔄",color:"ti-purple",url:"tools/image-convert.html"},

  {name:"计算器",desc:"科学计算器，支持常用数学运算",cat:"life",icon:"🧮",color:"ti-indigo",url:"tools/calculator.html"},
  // 设计工具
  {name:"CSS渐变生成",desc:"可视化生成CSS渐变代码，支持多种渐变类型",cat:"design",icon:"🌈",color:"ti-pink",url:"tools/css-gradient.html"},
  {name:"Box Shadow生成",desc:"可视化调整CSS阴影参数，实时预览效果",cat:"design",icon:"🔲",color:"ti-violet",url:"tools/box-shadow.html"},

  // 加密工具
  {name:"MD5哈希",desc:"计算文本的MD5哈希值",cat:"crypto",icon:"🔒",color:"ti-red",url:"tools/md5.html"},
  {name:"SHA256哈希",desc:"计算文本的SHA-256哈希值",cat:"crypto",icon:"🛡️",color:"ti-teal",url:"tools/sha256.html"},
  {name:"AES加解密",desc:"AES加密与解密文本内容",cat:"crypto",icon:"🔐",color:"ti-purple",url:"tools/aes.html"},
];

// Render tool count
document.getElementById('toolCount').textContent = tools.length;

// Render tools
function renderTools(filter = 'all', search = '') {
  const grid = document.getElementById('toolGrid');
  const searchLower = search.toLowerCase();
  const filtered = tools.filter(t => {
    const matchCat = filter === 'all' || t.cat === filter;
    const matchSearch = !search || t.name.toLowerCase().includes(searchLower) || t.desc.toLowerCase().includes(searchLower);
    return matchCat && matchSearch;
  });
  grid.innerHTML = filtered.map(t => `
    <a class="tool-card" href="${t.url}">
      <div class="tool-icon ${t.color}">${t.icon}</div>
      <div class="tool-info">
        <h3>${t.name}</h3>
        <p>${t.desc}</p>
      </div>
    </a>
  `).join('');
}

// Category tabs
document.getElementById('catTabs').addEventListener('click', e => {
  if (!e.target.classList.contains('cat-tab')) return;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  renderTools(e.target.dataset.cat, document.getElementById('searchInput').value);
});

// Search
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
searchInput.addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) {
    searchResults.classList.remove('active');
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.cat-tab[data-cat="all"]').classList.add('active');
    renderTools();
    return;
  }
  const matches = tools.filter(t => t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q));
  if (matches.length > 0) {
    searchResults.innerHTML = matches.map(t => `
      <a href="${t.url}">
        <div class="sr-icon ${t.color}">${t.icon}</div>
        <div class="sr-info"><h4>${t.name}</h4><span>${t.desc}</span></div>
      </a>
    `).join('');
  } else {
    searchResults.innerHTML = '<div class="search-no-result">未找到相关工具</div>';
  }
  searchResults.classList.add('active');
  renderTools('all', q);
});

// Close search results on click outside
document.addEventListener('click', e => {
  if (!e.target.closest('.search-box')) searchResults.classList.remove('active');
});

// Initial render
renderTools();
</script>
