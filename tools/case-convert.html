<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>大小写转换 - 万能工具箱</title>
<style>
:root{--bg:#f5f7fa;--bg2:#fff;--ink:#1a1a2e;--muted:#6b7280;--rule:#e5e7eb;--accent:#4f46e5;--accent2:#06b6d4}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","PingFang SC",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
header{background:var(--bg2);border-bottom:1px solid var(--rule);padding:12px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
header a{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--ink);font-weight:600;font-size:16px}
header svg{width:28px;height:28px;flex-shrink:0}
main{max-width:640px;margin:0 auto;padding:24px 16px}
.card{background:var(--bg2);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h2{font-size:15px;font-weight:600;margin-bottom:14px;color:var(--ink)}
textarea{width:100%;min-height:120px;padding:12px;border:1px solid var(--rule);border-radius:8px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--ink);resize:vertical;outline:none;transition:border-color .2s;line-height:1.6}
textarea:focus{border-color:var(--accent)}
.btn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.btn{padding:10px 8px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--bg);color:var(--ink);border:1px solid var(--rule)}
.btn-secondary:hover{background:var(--rule)}
.btn-cyan{background:var(--accent2);color:#fff}
.btn-cyan:hover{opacity:.9}
.result-box{margin-top:14px;display:none}
.result-box.show{display:block}
.result-box label{font-size:13px;font-weight:600;color:var(--ink);display:block;margin-bottom:6px}
.result-box .result-text{background:var(--bg);border:1px solid var(--rule);border-radius:8px;padding:12px;font-size:14px;word-break:break-all;min-height:42px;line-height:1.6;position:relative}
.result-box .copy-btn{position:absolute;top:8px;right:8px;padding:4px 10px;border-radius:6px;border:1px solid var(--rule);background:var(--bg2);color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s}
.result-box .copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
<a href="../index.html">
<svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#4f46e5"/><path d="M8 12h4v4H8zm6 0h4v4h-4zm6 0h4v4h-4zM8 18h4v4H8zm6 0h4v4h-4zm6 0h4v4h-4z" fill="#fff"/></svg>
万能工具箱
</a>
</header>
<main>
<div class="card">
<h2>输入文本</h2>
<textarea id="input" placeholder="在此输入需要转换的文本...&#10;&#10;支持多行文本"></textarea>
</div>

<div class="card">
<h2>选择转换方式</h2>
<div class="btn-grid">
<button class="btn btn-primary" onclick="convert('upper')">全部大写</button>
<button class="btn btn-primary" onclick="convert('lower')">全部小写</button>
<button class="btn btn-cyan" onclick="convert('capitalize')">首字母大写</button>
<button class="btn btn-cyan" onclick="convert('camelCase')">驼峰命名</button>
<button class="btn btn-secondary" onclick="convert('snakeCase')">下划线命名</button>
<button class="btn btn-secondary" onclick="convert('kebabCase')">短横线命名</button>
</div>
</div>

<div class="card result-box" id="resultBox">
<label>转换结果</label>
<div class="result-text" id="resultText">
<button class="copy-btn" onclick="copyResult()">复制</button>
<span id="resultContent"></span>
</div>
</div>
</main>
<div class="toast" id="toast"></div>
<script>
function convert(type){
  const input = document.getElementById('input').value;
  if(!input){ showToast('请输入文本'); return; }
  let result = '';
  switch(type){
    case 'upper':
      result = input.toUpperCase();
      break;
    case 'lower':
      result = input.toLowerCase();
      break;
    case 'capitalize':
      result = input.replace(/\b\w/g, c => c.toUpperCase());
      break;
    case 'camelCase':
      result = toCamelCase(input);
      break;
    case 'snakeCase':
      result = toSnakeCase(input);
      break;
    case 'kebabCase':
      result = toKebabCase(input);
      break;
  }
  const box = document.getElementById('resultBox');
  box.classList.add('show');
  document.getElementById('resultContent').textContent = result;
}

function splitWords(str){
  // 将驼峰、下划线、短横线、空格等分隔符拆分为单词数组
  return str
    .replace(/([a-z])([A-Z])/g, '$1 $2')
    .replace(/[_\-]+/g, ' ')
    .trim()
    .split(/\s+/)
    .filter(w => w.length > 0)
    .map(w => w.toLowerCase());
}

function toCamelCase(str){
  const words = splitWords(str);
  if(words.length === 0) return '';
  return words[0] + words.slice(1).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');
}

function toSnakeCase(str){
  const words = splitWords(str);
  return words.join('_');
}

function toKebabCase(str){
  const words = splitWords(str);
  return words.join('-');
}

function copyResult(){
  const text = document.getElementById('resultContent').textContent;
  if(!text){ showToast('没有可复制的内容'); return; }
  navigator.clipboard.writeText(text).then(()=> showToast('已复制到剪贴板'));
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
