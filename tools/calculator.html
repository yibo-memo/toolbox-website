<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>科学计算器 - 万能工具箱</title>
<style>
:root{--bg:#f5f7fa;--bg2:#fff;--ink:#1a1a2e;--muted:#6b7280;--rule:#e5e7eb;--accent:#4f46e5;--accent2:#06b6d4}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","PingFang SC",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
header{background:var(--bg2);border-bottom:1px solid var(--rule);padding:12px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
header a{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--ink);font-weight:600;font-size:16px}
header svg{width:28px;height:28px;flex-shrink:0}
main{max-width:420px;margin:0 auto;padding:24px 16px}
.calc{background:var(--bg2);border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.display{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:16px;min-height:90px;display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end;overflow:hidden}
.display .expr{font-size:14px;color:var(--muted);word-break:break-all;text-align:right;min-height:20px;margin-bottom:4px}
.display .result{font-size:32px;font-weight:700;color:var(--ink);word-break:break-all;text-align:right;font-variant-numeric:tabular-nums}
.history-toggle{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.history-toggle span{font-size:13px;font-weight:600;color:var(--ink)}
.history-toggle button{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:4px 0}
.history{background:var(--bg);border-radius:10px;padding:10px;max-height:150px;overflow-y:auto;margin-bottom:12px;display:none}
.history.show{display:block}
.history-item{font-size:13px;padding:6px 8px;border-radius:6px;cursor:pointer;color:var(--muted);transition:background .15s}
.history-item:hover{background:var(--rule);color:var(--ink)}
.history-item .h-expr{font-size:12px}
.history-item .h-result{font-weight:600;color:var(--ink)}
.history-empty{font-size:12px;color:var(--muted);text-align:center;padding:10px}
.buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.btn{padding:16px 0;border-radius:10px;border:none;font-size:18px;font-weight:500;cursor:pointer;transition:all .15s;user-select:none;-webkit-user-select:none}
.btn:active{transform:scale(.95)}
.btn-num{background:var(--bg);color:var(--ink)}
.btn-num:hover{background:var(--rule)}
.btn-op{background:#eef2ff;color:var(--accent)}
.btn-op:hover{background:#dde3ff}
.btn-fn{background:#f0fdfa;color:var(--accent2)}
.btn-fn:hover{background:#ccfbf1}
.btn-eq{background:var(--accent);color:#fff;grid-column:span 2}
.btn-eq:hover{opacity:.9}
.btn-clear{background:#fef2f2;color:#ef4444}
.btn-clear:hover{background:#fee2e2}
.btn-zero{grid-column:span 2}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
<a href="../index.html">
<svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#4f46e5"/><path d="M8 12h4v4H8zm6 0h4v4h-4zm6 0h4v4h-4zM8 18h4v4H8zm6 0h4v4h-4zm6 0h4v4h-4z" fill="#fff"/></svg>
万能工具箱
</a>
</header>
<main>
<div class="calc">
<div class="display">
<div class="expr" id="expr"></div>
<div class="result" id="result">0</div>
</div>
<div class="history-toggle">
<span>历史记录</span>
<button onclick="toggleHistory()" id="histToggle">展开</button>
</div>
<div class="history" id="historyPanel">
<div class="history-empty" id="histEmpty">暂无记录</div>
<div id="histList"></div>
</div>
<div class="buttons">
<button class="btn btn-clear" onclick="clearAll()">C</button>
<button class="btn btn-fn" onclick="inputFn('backspace')">⌫</button>
<button class="btn btn-fn" onclick="inputFn('percent')">%</button>
<button class="btn btn-op" onclick="inputOp('/')">÷</button>

<button class="btn btn-fn" onclick="inputFn('sqrt')">√</button>
<button class="btn btn-fn" onclick="inputFn('square')">x²</button>
<button class="btn btn-fn" onclick="inputFn('reciprocal')">1/x</button>
<button class="btn btn-op" onclick="inputOp('*')">×</button>

<button class="btn btn-num" onclick="inputNum('7')">7</button>
<button class="btn btn-num" onclick="inputNum('8')">8</button>
<button class="btn btn-num" onclick="inputNum('9')">9</button>
<button class="btn btn-op" onclick="inputOp('-')">−</button>

<button class="btn btn-num" onclick="inputNum('4')">4</button>
<button class="btn btn-num" onclick="inputNum('5')">5</button>
<button class="btn btn-num" onclick="inputNum('6')">6</button>
<button class="btn btn-op" onclick="inputOp('+')">+</button>

<button class="btn btn-num" onclick="inputNum('1')">1</button>
<button class="btn btn-num" onclick="inputNum('2')">2</button>
<button class="btn btn-num" onclick="inputNum('3')">3</button>
<button class="btn btn-fn" onclick="inputFn('negate')">±</button>

<button class="btn btn-num btn-zero" onclick="inputNum('0')">0</button>
<button class="btn btn-num" onclick="inputDot()">.</button>
<button class="btn btn-eq" onclick="calculate()">=</button>
</div>
</div>
</main>
<div class="toast" id="toast"></div>
<script>
let expression = '';
let displayExpr = '';
let currentNum = '0';
let lastResult = null;
let history = [];
let justCalculated = false;

function updateDisplay(){
  document.getElementById('expr').textContent = displayExpr;
  document.getElementById('result').textContent = currentNum || '0';
}

function inputNum(n){
  if(justCalculated){
    expression = '';
    displayExpr = '';
    justCalculated = false;
  }
  if(currentNum === '0' && n !== '.'){
    currentNum = n;
  } else {
    if(currentNum.length > 15) return;
    currentNum += n;
  }
  updateDisplay();
}

function inputDot(){
  if(justCalculated){
    expression = '';
    displayExpr = '';
    currentNum = '0';
    justCalculated = false;
  }
  if(currentNum.indexOf('.') !== -1) return;
  currentNum += '.';
  updateDisplay();
}

function inputOp(op){
  justCalculated = false;
  let displayOp = op;
  if(op === '*') displayOp = ' × ';
  else if(op === '/') displayOp = ' ÷ ';
  else if(op === '-') displayOp = ' − ';
  else displayOp = ' + ';
  expression += currentNum + op;
  displayExpr += currentNum + displayOp;
  currentNum = '0';
  updateDisplay();
}

function inputFn(fn){
  let val = parseFloat(currentNum);
  switch(fn){
    case 'backspace':
      if(justCalculated){ currentNum = '0'; justCalculated = false; }
      else if(currentNum.length > 1) currentNum = currentNum.slice(0,-1);
      else currentNum = '0';
      break;
    case 'percent':
      currentNum = String(val / 100);
      break;
    case 'sqrt':
      if(val < 0){ showToast('不能对负数开方'); return; }
      currentNum = String(Math.sqrt(val));
      break;
    case 'square':
      currentNum = String(val * val);
      break;
    case 'reciprocal':
      if(val === 0){ showToast('不能除以零'); return; }
      currentNum = String(1 / val);
      break;
    case 'negate':
      if(currentNum.startsWith('-')) currentNum = currentNum.substring(1);
      else if(currentNum !== '0') currentNum = '-' + currentNum;
      break;
  }
  updateDisplay();
}

function calculate(){
  let expr = expression + currentNum;
  let displayE = displayExpr + currentNum;
  try {
    let result = Function('"use strict"; return (' + expr + ')')();
    if(typeof result !== 'number' || !isFinite(result)){
      showToast('计算错误');
      return;
    }
    let formatted = formatNum(result);
    document.getElementById('expr').textContent = displayE + ' =';
    document.getElementById('result').textContent = formatted;
    history.unshift({ expr: displayE, result: formatted });
    if(history.length > 20) history.pop();
    renderHistory();
    expression = '';
    displayExpr = '';
    currentNum = String(result);
    justCalculated = true;
  } catch(e){
    showToast('表达式错误');
  }
}

function clearAll(){
  expression = '';
  displayExpr = '';
  currentNum = '0';
  justCalculated = false;
  updateDisplay();
}

function formatNum(n){
  if(Number.isInteger(n) && Math.abs(n) < 1e15) return n.toString();
  let s = parseFloat(n.toPrecision(12)).toString();
  if(s.length > 16) s = n.toExponential(6);
  return s;
}

function toggleHistory(){
  const panel = document.getElementById('historyPanel');
  const btn = document.getElementById('histToggle');
  if(panel.classList.contains('show')){
    panel.classList.remove('show');
    btn.textContent = '展开';
  } else {
    panel.classList.add('show');
    btn.textContent = '收起';
  }
}

function renderHistory(){
  const list = document.getElementById('histList');
  const empty = document.getElementById('histEmpty');
  if(history.length === 0){
    empty.style.display = 'block';
    list.innerHTML = '';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = history.map((h,i)=> '<div class="history-item" onclick="useHistory('+i+')"><div class="h-expr">'+escHtml(h.expr)+'</div><div class="h-result">= '+escHtml(h.result)+'</div></div>').join('');
}

function useHistory(i){
  currentNum = history[i].result;
  justCalculated = true;
  updateDisplay();
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2000);
}

document.addEventListener('keydown', function(e){
  if(e.key >= '0' && e.key <= '9'){ inputNum(e.key); e.preventDefault(); }
  else if(e.key === '.'){ inputDot(); e.preventDefault(); }
  else if(e.key === '+'){ inputOp('+'); e.preventDefault(); }
  else if(e.key === '-'){ inputOp('-'); e.preventDefault(); }
  else if(e.key === '*'){ inputOp('*'); e.preventDefault(); }
  else if(e.key === '/'){ inputOp('/'); e.preventDefault(); }
  else if(e.key === 'Enter' || e.key === '='){ calculate(); e.preventDefault(); }
  else if(e.key === 'Backspace'){ inputFn('backspace'); e.preventDefault(); }
  else if(e.key === 'Escape' || e.key === 'Delete' || e.key === 'c' || e.key === 'C'){
    if(!e.ctrlKey && !e.metaKey){ clearAll(); e.preventDefault(); }
  }
});

updateDisplay();
</script>
</body>
</html>
