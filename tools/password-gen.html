<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随机密码生成器 - 万能工具箱</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f7fa;--bg2:#ffffff;--ink:#1a1a2e;--muted:#6b7280;--rule:#e5e7eb;
  --accent:#4f46e5;--accent2:#06b6d4;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","PingFang SC",sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.6;min-height:100vh;display:flex;flex-direction:column;
}
a{text-decoration:none;color:inherit}

.site-header{
  background:var(--bg2);border-bottom:1px solid var(--rule);padding:12px 24px;
  display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.site-header a{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px;color:var(--ink);transition:opacity .2s}
.site-header a:hover{opacity:.75}
.site-header svg{width:28px;height:28px;flex-shrink:0}

.main-wrap{flex:1;padding:24px 16px 40px;max-width:800px;margin:0 auto;width:100%}
.tool-title{font-size:22px;font-weight:700;margin-bottom:4px}
.tool-desc{color:var(--muted);font-size:14px;margin-bottom:20px}

.panel{
  background:var(--bg2);border:1px solid var(--rule);border-radius:12px;
  padding:20px;display:flex;flex-direction:column;
}
.panel+.panel{margin-top:16px}
.panel-label{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px}

/* Slider row */
.slider-row{
  display:flex;align-items:center;gap:16px;
}
.slider-row input[type="range"]{
  flex:1;height:6px;-webkit-appearance:none;appearance:none;
  background:var(--rule);border-radius:3px;outline:none;cursor:pointer;
}
.slider-row input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;width:22px;height:22px;border-radius:50%;
  background:var(--accent);cursor:pointer;border:3px solid var(--bg2);
  box-shadow:0 1px 4px rgba(0,0,0,.2);
}
.slider-row input[type="number"]{
  width:60px;padding:6px 8px;border:1px solid var(--rule);border-radius:8px;
  font-size:15px;font-weight:600;text-align:center;font-family:inherit;
  background:var(--bg);color:var(--ink);outline:none;
}
.slider-row input[type="number"]:focus{border-color:var(--accent)}
.slider-val{
  font-size:28px;font-weight:800;color:var(--accent);min-width:42px;text-align:right;
}

/* Checkboxes */
.char-options{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;
}
.char-opt{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  border:1px solid var(--rule);border-radius:10px;cursor:pointer;
  transition:all .2s;user-select:none;
}
.char-opt:hover{border-color:var(--accent);background:rgba(79,70,229,.04)}
.char-opt.active{border-color:var(--accent);background:rgba(79,70,229,.08)}
.char-opt input{display:none}
.char-opt .check-box{
  width:20px;height:20px;border:2px solid var(--rule);border-radius:5px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;
}
.char-opt.active .check-box{
  background:var(--accent);border-color:var(--accent);
}
.char-opt.active .check-box::after{
  content:'';display:block;width:5px;height:9px;
  border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-bottom:2px;
}
.char-opt .opt-label{font-size:14px;font-weight:500}
.char-opt .opt-hint{font-size:11px;color:var(--muted)}

/* Generate button */
.gen-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}

.btn{
  display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:8px;
  font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#4338ca}
.btn-secondary{background:var(--bg);color:var(--ink);border:1px solid var(--rule)}
.btn-secondary:hover{background:#ebedf2}
.btn:active{transform:scale(.97)}

/* Password list */
.pwd-list{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.pwd-item{
  display:flex;align-items:center;gap:10px;padding:14px 16px;
  border:1px solid var(--rule);border-radius:10px;background:var(--bg);
  transition:all .2s;position:relative;overflow:hidden;
}
.pwd-item:hover{border-color:var(--accent2);background:rgba(6,182,212,.04)}
.pwd-item .pwd-text{
  flex:1;font-family:"SF Mono",SFMono-Regular,Consolas,"Liberation Mono",Menlo,monospace;
  font-size:15px;word-break:break-all;line-height:1.5;color:var(--ink);
}
.pwd-item .copy-btn{
  padding:6px 14px;border:1px solid var(--rule);border-radius:7px;
  background:var(--bg2);color:var(--muted);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit;
}
.pwd-item .copy-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Strength bar */
.strength-bar-wrap{
  margin-top:12px;display:flex;align-items:center;gap:12px;
}
.strength-track{
  flex:1;height:8px;background:var(--rule);border-radius:4px;overflow:hidden;
}
.strength-fill{
  height:100%;border-radius:4px;transition:all .4s;width:0;
}
.strength-label{
  font-size:13px;font-weight:600;min-width:40px;text-align:right;
}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--ink);color:#fff;padding:10px 24px;border-radius:8px;
  font-size:14px;font-weight:500;opacity:0;transition:all .3s;z-index:999;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
  .main-wrap{padding:16px 12px 32px}
  .panel{padding:16px}
  .char-options{grid-template-columns:1fr}
  .pwd-item{flex-direction:column;align-items:stretch}
  .pwd-item .copy-btn{align-self:flex-start}
  .btn{padding:10px 16px;font-size:13px}
}
</style>
</head>
<body>

<header class="site-header">
  <a href="../index.html">
    <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#4f46e5"/><path d="M8 12h4v4H8zm6 0h4v4h-4zm6 0h4v4h-4zM8 18h4v4H8zm6 0h4v4h-4zm6 0h4v4h-4z" fill="#fff"/></svg>
    万能工具箱
  </a>
</header>

<main class="main-wrap">
  <h1 class="tool-title">随机密码生成器</h1>
  <p class="tool-desc">生成安全可靠的随机密码，支持自定义长度和字符类型。</p>

  <!-- Length -->
  <div class="panel">
    <div class="panel-label">密码长度</div>
    <div class="slider-row">
      <input type="range" id="pwdLength" min="8" max="64" value="16" oninput="syncLength(this.value)">
      <span class="slider-val" id="lengthVal">16</span>
      <input type="number" id="pwdLengthNum" min="8" max="64" value="16" oninput="syncLengthFromNum(this.value)">
    </div>
  </div>

  <!-- Character options -->
  <div class="panel">
    <div class="panel-label">字符类型</div>
    <div class="char-options">
      <label class="char-opt active" id="optUpper" onclick="toggleOpt('upper')">
        <input type="checkbox" checked data-key="upper">
        <span class="check-box"></span>
        <span>
          <span class="opt-label">大写字母</span>
          <span class="opt-hint">A-Z</span>
        </span>
      </label>
      <label class="char-opt active" id="optLower" onclick="toggleOpt('lower')">
        <input type="checkbox" checked data-key="lower">
        <span class="check-box"></span>
        <span>
          <span class="opt-label">小写字母</span>
          <span class="opt-hint">a-z</span>
        </span>
      </label>
      <label class="char-opt active" id="optDigits" onclick="toggleOpt('digits')">
        <input type="checkbox" checked data-key="digits">
        <span class="check-box"></span>
        <span>
          <span class="opt-label">数字</span>
          <span class="opt-hint">0-9</span>
        </span>
      </label>
      <label class="char-opt active" id="optSpecial" onclick="toggleOpt('special')">
        <input type="checkbox" checked data-key="special">
        <span class="check-box"></span>
        <span>
          <span class="opt-label">特殊字符</span>
          <span class="opt-hint">!@#$%^&amp;*()-_=+</span>
        </span>
      </label>
    </div>
  </div>

  <!-- Generate -->
  <div class="panel">
    <div class="panel-label">生成密码</div>
    <div class="gen-actions">
      <button class="btn btn-primary" onclick="generatePasswords()">生成密码</button>
      <button class="btn btn-secondary" onclick="copyAll()">复制全部</button>
    </div>

    <div class="strength-bar-wrap" id="strengthWrap">
      <div class="strength-track">
        <div class="strength-fill" id="strengthFill"></div>
      </div>
      <span class="strength-label" id="strengthLabel">--</span>
    </div>

    <div class="pwd-list" id="pwdList"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
var CHARS = {
  upper:   'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  lower:   'abcdefghijklmnopqrstuvwxyz',
  digits:  '0123456789',
  special: '!@#$%^&*()-_=+[]{}|;:,.<>?'
};

var opts = { upper:true, lower:true, digits:true, special:true };

function toggleOpt(key){
  // Check how many are active
  var activeCount = Object.values(opts).filter(function(v){return v}).length;
  if(opts[key] && activeCount <= 1){
    showToast('至少需要保留一种字符类型');
    return;
  }
  opts[key] = !opts[key];
  var el = document.getElementById('opt' + key.charAt(0).toUpperCase() + key.slice(1));
  el.querySelector('input').checked = opts[key];
  el.classList.toggle('active', opts[key]);
  generatePasswords();
}

function syncLength(val){
  val = Math.max(8, Math.min(64, parseInt(val) || 16));
  document.getElementById('pwdLength').value = val;
  document.getElementById('pwdLengthNum').value = val;
  document.getElementById('lengthVal').textContent = val;
  generatePasswords();
}

function syncLengthFromNum(val){
  val = Math.max(8, Math.min(64, parseInt(val) || 16));
  document.getElementById('pwdLength').value = val;
  document.getElementById('pwdLengthNum').value = val;
  document.getElementById('lengthVal').textContent = val;
  generatePasswords();
}

function getStrength(length){
  var types = Object.values(opts).filter(function(v){return v}).length;
  var poolSize = 0;
  for(var k in opts){
    if(opts[k]) poolSize += CHARS[k].length;
  }
  var entropy = Math.log2(poolSize) * length;

  if(length < 10 || types <= 1 || entropy < 40) return {level:0, label:'弱', color:'#ef4444', pct:20};
  if(length < 14 || types <= 2 || entropy < 60) return {level:1, label:'中', color:'#f59e0b', pct:45};
  if(length < 20 || types <= 3 || entropy < 80) return {level:2, label:'强', color:'#22c55e', pct:72};
  return {level:3, label:'极强', color:'var(--accent2)', pct:100};
}

function generateOnePassword(length){
  var pool = '';
  var required = [];
  for(var k in opts){
    if(opts[k]){
      pool += CHARS[k];
      required.push(k);
    }
  }
  if(!pool) return '';

  var arr = new Uint32Array(length);
  crypto.getRandomValues(arr);

  var pwd = [];
  for(var i=0;i<length;i++){
    pwd.push(pool[arr[i] % pool.length]);
  }

  // Ensure at least one char from each selected type
  for(var t=0;t<required.length;t++){
    var typePool = CHARS[required[t]];
    var pos = arr[t] % length;
    var randByte = new Uint32Array(1);
    crypto.getRandomValues(randByte);
    pwd[pos] = typePool[randByte[0] % typePool.length];
  }

  return pwd.join('');
}

function generatePasswords(){
  var length = parseInt(document.getElementById('pwdLength').value) || 16;
  var list = document.getElementById('pwdList');
  list.innerHTML = '';
  var passwords = [];
  for(var i=0;i<5;i++){
    passwords.push(generateOnePassword(length));
  }
  for(var i=0;i<passwords.length;i++){
    var item = document.createElement('div');
    item.className = 'pwd-item';
    item.innerHTML =
      '<span class="pwd-text">' + escapeHTML(passwords[i]) + '</span>' +
      '<button class="copy-btn" onclick="copyPassword(this, \'' + escapeAttr(passwords[i]) + '\')">复制</button>';
    list.appendChild(item);
  }

  // Strength indicator
  var str = getStrength(length);
  var fill = document.getElementById('strengthFill');
  var label = document.getElementById('strengthLabel');
  fill.style.width = str.pct + '%';
  fill.style.background = str.color;
  label.textContent = str.label;
  label.style.color = str.color;
}

function escapeHTML(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(s){
  return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

function copyPassword(btn, pwd){
  // unescape
  var decoded = pwd.replace(/\\(.)/g, function(m,c){return c});
  navigator.clipboard.writeText(decoded).then(function(){
    btn.textContent = '已复制';
    btn.style.borderColor = 'var(--accent2)';
    btn.style.color = 'var(--accent2)';
    setTimeout(function(){
      btn.textContent = '复制';
      btn.style.borderColor = '';
      btn.style.color = '';
    }, 1500);
  });
}

function copyAll(){
  var items = document.querySelectorAll('.pwd-text');
  var all = [];
  items.forEach(function(el){all.push(el.textContent)});
  navigator.clipboard.writeText(all.join('\n')).then(function(){
    showToast('已复制全部 5 个密码');
  });
}

function showToast(msg){
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(function(){el.classList.remove('show');}, 2000);
}

// Generate on load
window.addEventListener('DOMContentLoaded', generatePasswords);
</script>
</body>
</html>
