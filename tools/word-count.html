<script>
var textInput = document.getElementById('textInput');

function updateStats() {
  var text = textInput.value;

  // Character count with spaces
  var totalChars = text.length;

  // Character count without spaces
  var noSpaceChars = text.replace(/\s/g, '').length;

  // Word count: split by whitespace, count non-empty
  var words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;

  // Line count
  var lines = text === '' ? 0 : text.split('\n').length;

  // Paragraph count: split by one or more blank lines
  var paragraphs = text.trim() === '' ? 0 : text.trim().split(/\n\s*\n/).length;

  // Chinese character count
  var chinese = (text.match(/[\u4e00-\u9fff\u3400-\u4dbf]/g) || []).length;

  // English character count (a-z, A-Z)
  var english = (text.match(/[a-zA-Z]/g) || []).length;

  // Punctuation count (Chinese + English punctuation)
  var punctPattern = /[，。！？、；：""''【】《》（）…—\-,\.!\?;:'"\[\]\(\)\{\}\/\\@#\$%\^&\*\+=~`<>|]/;
  var punctCount = 0;
  for (var i = 0; i < text.length; i++) {
    if (punctPattern.test(text[i])) {
      punctCount++;
    }
  }

  document.getElementById('charCount').textContent = totalChars;
  document.getElementById('charNoSpace').textContent = noSpaceChars;
  document.getElementById('wordCount').textContent = words;
  document.getElementById('lineCount').textContent = lines;
  document.getElementById('paraCount').textContent = paragraphs;
  document.getElementById('chineseCount').textContent = chinese;
  document.getElementById('engCount').textContent = english;
  document.getElementById('punctCount').textContent = punctCount;
}

function clearText() {
  textInput.value = '';
  updateStats();
  textInput.focus();
}

textInput.addEventListener('input', updateStats);
updateStats();
</script>
