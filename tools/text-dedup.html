<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>文本去重 - 万能工具箱</title>
<style>
:root{--bg:#f5f7fa;--bg2:#fff;--ink:#1a1a2e;--muted:#6b7280;--rule:#e5e7eb;--accent:#4f46e5;--accent2:#06b6d4}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","PingFang SC",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
header{background:var(--bg2);border-bottom:1px solid var(--rule);padding:12px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
header a{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--ink);font-weight:600;font-size:16px}
header svg{width:28px;height:28px;flex-shrink:0}
main{max-width:640px;margin:0 auto;padding:24px 16px}
.card{background:var(--bg2);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h2{font-size:15px;font-weight:600;margin-bottom:14px;color:var(--ink)}
textarea{width:100%;min-height:180px;padding:12px;border:1px solid var(--rule);border-radius:8px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--ink);resize:vertical;outline:none;transition:border-color .2s;line-height:1.6}
textarea:focus{border-color:var(--accent)}
.options{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px}
.option{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink);cursor:pointer;user-select:none}
.option input{accent-color:var(--accent);width:16px;height:16px}
.btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--bg);color:var(--ink);border:1px solid var(--rule)}
.btn-secondary:hover{background:var(--rule)}
.btn-cyan{background:var(--accent2);color:#fff}
.btn-cyan:hover{opacity:.9}
.result-card{display:none}
.result-card.show{display:block}
.stat-row{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.stat-item{font-size:13px;color:var(--muted)}
.stat-item strong{color:var(--accent);font-size:18px;font-weight:700}
.stat-arrow{color:var(--rule);font-size:18px}
.stat-diff{font-size:12px;padding:2px 8px;border-radius:4px;background:#fef2f2;color:#ef4444;font-weight:600}
.stat-diff.none{background:#f0fdf4;color:#22c55e}
.result-textarea{margin-top:14px;width:100%;min-height:150px}
.copy-row{display:flex;gap:8px;margin-top:10px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
<a href="../index.html">
<svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#4f46e5"/><path d="M8 12h4v4H8zm6 0h4v4h-4zm6 0h4v4h-4zM8 18h4v4H8zm6 0h4v4h-4zm6 0h4v4h-4z" fill="#fff"/></svg>
万能工具箱
</a>
</header>
<main>
<div class="card">
<h2>输入文本（每行一个条目）</h2>
<textarea id="input" placeholder="在此输入需要去重的文本，每行一个条目...&#10;&#10;例如：&#10;apple&#10;banana&#10;apple&#10;orange&#10;banana&#10;grape"></textarea>
<div class="options">
<label class="option"><input type="checkbox" id="optTrim" checked> 忽略首尾空格</label>
<label class="option"><input type="checkbox" id="optEmpty" checked> 忽略空行</label>
<label class="option"><input type="checkbox" id="optSort"> 结果排序</label>
</div>
<div class="btn-row">
<button class="btn btn-primary" onclick="deduplicate()">去重</button>
<button class="btn btn-secondary" onclick="clearAll()">清空</button>
</div>
</div>

<div class="card result-card" id="resultCard">
<h2>去重结果</h2>
<div class="stat-row">
<div class="stat-item">原始行数：<strong id="origCount">0</strong></div>
<span class="stat-arrow">→</span>
<div class="stat-item">去重后：<strong id="resultCount">0</strong></div>
<span class="stat-diff" id="statDiff">-0 行</span>
</div>
<textarea id="output" class="result-textarea" readonly></textarea>
<div class="copy-row">
<button class="btn btn-primary" onclick="copyResult()">复制结果</button>
</div>
</div>
</main>
<div class="toast" id="toast"></div>
<script>
function deduplicate(){
  const input = document.getElementById('input').value;
  if(!input){ showToast('请输入文本'); return; }
  const trim = document.getElementById('optTrim').checked;
  const empty = document.getElementById('optEmpty').checked;
  const sort = document.getElementById('optSort').checked;

  let lines = input.split('\n');
  const origCount = lines.length;

  if(trim){
    lines = lines.map(l => l.trim());
  }

  if(empty){
    lines = lines.filter(l => l.length > 0);
  }

  const seen = new Set();
  const unique = [];
  lines.forEach(line => {
    if(!seen.has(line)){
      seen.add(line);
      unique.push(line);
    }
  });

  if(sort){
    unique.sort((a, b) => a.localeCompare(b, 'zh-CN'));
  }

  document.getElementById('output').value = unique.join('\n');
  document.getElementById('origCount').textContent = origCount;
  document.getElementById('resultCount').textContent = unique.length;

  const diff = origCount - unique.length;
  const diffEl = document.getElementById('statDiff');
  if(diff === 0){
    diffEl.textContent = '无重复';
    diffEl.className = 'stat-diff none';
  } else {
    diffEl.textContent = '-'+diff+' 行';
    diffEl.className = 'stat-diff';
  }

  document.getElementById('resultCard').classList.add('show');
}

function copyResult(){
  const output = document.getElementById('output');
  if(!output.value){ showToast('没有可复制的内容'); return; }
  navigator.clipboard.writeText(output.value).then(()=> showToast('已复制到剪贴板'));
}

function clearAll(){
  document.getElementById('input').value = '';
  document.getElementById('output').value = '';
  document.getElementById('resultCard').classList.remove('show');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
