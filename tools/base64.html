<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 编解码 - 万能工具箱</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f7fa;--bg2:#ffffff;--ink:#1a1a2e;--muted:#6b7280;--rule:#e5e7eb;
  --accent:#4f46e5;--accent2:#06b6d4;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","PingFang SC",sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.6;min-height:100vh;display:flex;flex-direction:column;
}
a{text-decoration:none;color:inherit}

/* Header */
.site-header{
  background:var(--bg2);border-bottom:1px solid var(--rule);padding:12px 24px;
  display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.site-header a{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px;color:var(--ink);transition:opacity .2s}
.site-header a:hover{opacity:.75}
.site-header svg{width:28px;height:28px;flex-shrink:0}

/* Main */
.main-wrap{flex:1;padding:24px 16px 40px;max-width:1100px;margin:0 auto;width:100%}
.tool-title{font-size:22px;font-weight:700;margin-bottom:4px}
.tool-desc{color:var(--muted);font-size:14px;margin-bottom:20px}

/* Grid */
.tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){
  .tool-grid{grid-template-columns:1fr}
}

/* Panel */
.panel{
  background:var(--bg2);border:1px solid var(--rule);border-radius:12px;
  padding:16px;display:flex;flex-direction:column;
}
.panel-label{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.panel textarea{
  width:100%;min-height:180px;resize:vertical;border:1px solid var(--rule);border-radius:8px;
  padding:12px;font-size:14px;font-family:"SF Mono",SFMono-Regular,Consolas,"Liberation Mono",Menlo,monospace;
  background:var(--bg);color:var(--ink);outline:none;transition:border-color .2s;line-height:1.5;
}
.panel textarea:focus{border-color:var(--accent)}
.panel textarea::placeholder{color:#b0b7c3}

/* Actions bar */
.actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
@media(max-width:700px){
  .actions{grid-column:1/-1}
}
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:8px;
  font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#4338ca;transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,.3)}
.btn-secondary{background:var(--accent2);color:#fff}
.btn-secondary:hover{background:#0891b2;transform:translateY(-1px);box-shadow:0 4px 12px rgba(6,182,212,.3)}
.btn-outline{background:var(--bg2);color:var(--ink);border:1px solid var(--rule)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}

/* Error toast */
.toast{
  position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:#ef4444;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;
  opacity:0;pointer-events:none;transition:all .3s;z-index:999;white-space:nowrap;
  box-shadow:0 4px 16px rgba(239,68,68,.3);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}

/* Auto-detect badge */
.detect-badge{
  font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500;
}
.detect-text{background:#dbeafe;color:#1d4ed8}
.detect-base64{background:#ede9fe;color:#7c3aed}

/* Copy success */
.btn.copied{background:#10b981 !important;color:#fff}

/* Footer */
.site-footer{text-align:center;padding:20px;font-size:12px;color:var(--muted);border-top:1px solid var(--rule)}
</style>
</head>
<body>

<header class="site-header">
  <a href="../index.html">
    <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#4f46e5"/><path d="M8 12h4v4H8zm6 0h4v4h-4zm6 0h4v4h-4zM8 18h4v4H8zm6 0h4v4h-4zm6 0h4v4h-4z" fill="#fff"/></svg>
    <span>万能工具箱</span>
  </a>
</header>

<main class="main-wrap">
  <h1 class="tool-title">Base64 编解码</h1>
  <p class="tool-desc">快速将文本编码为 Base64 字符串，或将 Base64 字符串解码为文本。支持自动检测输入类型。</p>

  <div class="tool-grid">
    <!-- Input panel -->
    <div class="panel">
      <div class="panel-label">
        <span>输入</span>
        <span class="detect-badge detect-text" id="detectBadge">普通文本</span>
      </div>
      <textarea id="inputArea" placeholder="在此粘贴文本或 Base64 字符串..." spellcheck="false"></textarea>
    </div>

    <!-- Output panel -->
    <div class="panel">
      <div class="panel-label">
        <span>输出</span>
        <button class="btn btn-outline" style="padding:4px 12px;font-size:12px" onclick="copyOutput()" id="copyBtn">复制结果</button>
      </div>
      <textarea id="outputArea" placeholder="结果将显示在这里..." readonly spellcheck="false"></textarea>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-primary" onclick="encodeText()">编码 (文本 → Base64)</button>
      <button class="btn btn-secondary" onclick="decodeText()">解码 (Base64 → 文本)</button>
      <button class="btn btn-outline" onclick="autoProcess()">自动检测并转换</button>
      <button class="btn btn-outline" onclick="clearAll()">清空</button>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<footer class="site-footer">万能工具箱 &copy; 2026</footer>

<script>
const inputArea = document.getElementById('inputArea');
const outputArea = document.getElementById('outputArea');
const detectBadge = document.getElementById('detectBadge');
const toastEl = document.getElementById('toast');

// Auto-detect input type on typing
inputArea.addEventListener('input', () => {
  const val = inputArea.value.trim();
  if (!val) {
    setBadge('text');
    return;
  }
  if (isBase64(val)) {
    setBadge('base64');
  } else {
    setBadge('text');
  }
});

function isBase64(str) {
  // Base64 string regex: only A-Za-z0-9+/=, length multiple of 4 (with optional padding)
  const b64Regex = /^[A-Za-z0-9+/\r\n]*={0,2}$/;
  const cleaned = str.replace(/[\r\n\s]/g, '');
  if (!b64Regex.test(str)) return false;
  if (cleaned.length < 4) return false;
  if (cleaned.length % 4 !== 0) return false;
  // Try decoding to verify
  try {
    atob(cleaned);
    return true;
  } catch {
    return false;
  }
}

function setBadge(type) {
  if (type === 'base64') {
    detectBadge.textContent = 'Base64';
    detectBadge.className = 'detect-badge detect-base64';
  } else {
    detectBadge.textContent = '普通文本';
    detectBadge.className = 'detect-badge detect-text';
  }
}

function encodeText() {
  const val = inputArea.value;
  if (!val) {
    showToast('请先输入需要编码的文本');
    return;
  }
  try {
    // Support Unicode
    const encoded = btoa(unescape(encodeURIComponent(val)));
    outputArea.value = encoded;
    setBadge('text');
    showToast('编码成功');
  } catch (e) {
    showToast('编码失败: ' + e.message);
  }
}

function decodeText() {
  const val = inputArea.value.trim();
  if (!val) {
    showToast('请先输入需要解码的 Base64 字符串');
    return;
  }
  try {
    const cleaned = val.replace(/[\r\n\s]/g, '');
    const decoded = decodeURIComponent(escape(atob(cleaned)));
    outputArea.value = decoded;
    setBadge('base64');
    showToast('解码成功');
  } catch (e) {
    outputArea.value = '';
    showToast('解码失败：输入不是有效的 Base64 字符串');
  }
}

function autoProcess() {
  const val = inputArea.value.trim();
  if (!val) {
    showToast('请先输入内容');
    return;
  }
  if (isBase64(val)) {
    decodeText();
  } else {
    encodeText();
  }
}

function copyOutput() {
  const text = outputArea.value;
  if (!text) {
    showToast('没有可复制的内容');
    return;
  }
  const btn = document.getElementById('copyBtn');
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '已复制';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '复制结果';
      btn.classList.remove('copied');
    }, 1500);
  }).catch(() => {
    // Fallback
    outputArea.select();
    document.execCommand('copy');
    btn.textContent = '已复制';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '复制结果';
      btn.classList.remove('copied');
    }, 1500);
  });
}

function clearAll() {
  inputArea.value = '';
  outputArea.value = '';
  setBadge('text');
}

let toastTimer = null;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toastEl.classList.remove('show');
  }, 2500);
}
</script>
</body>
</html>
