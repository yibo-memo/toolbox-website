<script>
/* ============================================================
   Lightweight QR Code Generator (inlined, no external deps)
   Based on QRCode Model 2, pure JS, supports Byte mode (UTF-8)
   ============================================================ */

var QRCode = (function(){
  // Error correction levels
  var ECL = {L:0,M:1,Q:2,H:3};
  // Version capacity table (byte mode, ecl L) - simplified for versions 1-40
  // We'll compute dynamically

  // GF(256) arithmetic
  var EXP = new Array(256);
  var LOG = new Array(256);
  (function(){
    var x = 1;
    for(var i=0;i<255;i++){
      EXP[i] = x;
      LOG[x] = i;
      x <<= 1;
      if(x & 256) x ^= 0x11d;
    }
    EXP[255] = EXP[0];
  })();

  function gfMul(a,b){
    if(a===0||b===0) return 0;
    return EXP[(LOG[a]+LOG[b])%255];
  }

  function polyMul(p1,p2){
    var r = new Array(p1.length+p2.length-1).fill(0);
    for(var i=0;i<p1.length;i++)
      for(var j=0;j<p2.length;j++)
        r[i+j] ^= gfMul(p1[i],p2[j]);
    return r;
  }

  function polyRest(dividend,divisor){
    var r = dividend.slice();
    for(var i=0;i<dividend.length-divisor.length+1;i++){
      if(r[i]!==0){
        for(var j=0;j<divisor.length;j++)
          r[i+j] ^= gfMul(divisor[j],r[i]);
      }
    }
    return r.slice(dividend.length-divisor.length+1);
  }

  function generatorPoly(n){
    var g = [1];
    for(var i=0;i<n;i++){
      g = polyMul(g, [1, EXP[i]]);
    }
    return g;
  }

  // Reed-Solomon
  function rsEncode(data, ecLen){
    var gen = generatorPoly(ecLen);
    var padded = data.concat(new Array(ecLen).fill(0));
    var remainder = polyRest(padded, gen);
    return data.concat(remainder);
  }

  // QR version data
  // Total data codewords capacity per version, per EC level
  // Format: VERSIONS_DATA[version-1] = [L, M, Q, H] in total codewords
  var VERSION_INFO = [
    //  L   M   Q   H  (total codewords including EC)
    [26,26,26,26],      // v1
    [44,44,44,44],      // v2
    [70,70,70,70],      // v3
    [100,100,100,100],  // v4
    [134,134,134,134],  // v5
    [172,172,172,172],  // v6
    [196,196,196,196],  // v7
    [242,242,242,242],  // v8
    [292,292,292,292],  // v9
    [346,346,346,346],  // v10
  ];

  var EC_CODEWORDS_PER_BLOCK = [
    //  L  M  Q  H
    [7,10,13,17],    // v1
    [10,16,22,28],   // v2
    [15,26,18,22],   // v3
    [20,18,26,16],   // v4
    [26,24,18,22],   // v5
    [18,16,24,28],   // v6
    [20,18,18,26],   // v7
    [24,22,22,26],   // v8
    [30,22,20,24],   // v9
    [18,26,24,28],   // v10
  ];

  var NUM_BLOCKS = [
    // L M Q H
    [1,1,1,1],   // v1
    [1,1,2,2],   // v2
    [1,2,2,4],   // v3
    [1,2,4,4],   // v4
    [1,4,4,4],   // v5
    [2,4,2,4],   // v6
    [2,4,4,4],   // v7
    [2,2,4,4],   // v8
    [2,3,4,4],   // v9
    [4,4,6,6],   // v10
  ];

  var DATA_CODEWORDS = []; // computed
  (function(){
    for(var v=0;v<10;v++){
      DATA_CODEWORDS[v] = [0,0,0,0];
      for(var e=0;e<4;e++){
        var total = VERSION_INFO[v][e];
        var ecPerBlock = EC_CODEWORDS_PER_BLOCK[v][e];
        var blocks = NUM_BLOCKS[v][e];
        DATA_CODEWORDS[v][e] = total - ecPerBlock * blocks;
      }
    }
  })();

  // Alignment pattern positions
  var ALIGN_POS = [
    [], [], [6,18], [6,22], [6,26], [6,30], [6,34],
    [6,22,38], [6,24,42], [6,26,46], [6,28,50]
  ];

  // Format info strings (XOR mask already applied)
  var FORMAT_INFO = [
    0x77c4,0x72f3,0x7daa,0x789d,0x662f,0x6318,0x6c41,0x6976,
    0x5412,0x5125,0x5e7c,0x5b4b,0x45f9,0x40ce,0x4f97,0x4aa0,
    0x355f,0x3068,0x3f31,0x3a06,0x24b4,0x2183,0x2eda,0x2bed,
    0x1689,0x13be,0x1ce7,0x19d0,0x0762,0x0255,0x0d0c,0x083b
  ];

  function getVersion(dataLen){
    // Byte mode: char count indicator is 1 byte for v1-9, 2 bytes for v10+
    // Data capacity = (data codewords) * 8 bits, minus mode+charcount bits
    // Mode indicator (4 bits) + char count (8 or 16 bits)
    for(var v=0;v<10;v++){
      var cap = DATA_CODEWORDS[v][0]*8; // EC level L
      var overhead = 4 + 8; // mode + char count (8 bits for v<=9)
      if(v >= 9) overhead = 4 + 16;
      if(dataLen * 8 <= cap - overhead) return v+1;
    }
    return 10; // fallback v10
  }

  function encodeData(text, version, ecl){
    var vi = version - 1;
    var totalDataCW = DATA_CODEWORDS[vi][ecl];
    var modeBits = '0100'; // Byte mode
    var ccBits = version <= 9 ? ('0000' + text.length.toString(2)).slice(-8) : ('00000000' + text.length.toString(2)).slice(-16);
    var dataBits = modeBits + ccBits;
    for(var i=0;i<text.length;i++){
      var b = text.charCodeAt(i);
      if(b > 255) b = 63; // fallback to '?'
      dataBits += ('00000000' + b.toString(2)).slice(-8);
    }
    // Pad to multiple of 8
    while(dataBits.length % 8 !== 0) dataBits += '0';
    // Convert to byte array
    var bytes = [];
    for(var i=0;i<dataBits.length;i+=8){
      bytes.push(parseInt(dataBits.substr(i,8),2));
    }
    // Pad codewords
    var padBytes = [0xEC, 0x11];
    var padIdx = 0;
    while(bytes.length < totalDataCW){
      bytes.push(padBytes[padIdx % 2]);
      padIdx++;
    }
    return bytes;
  }

  function interleaveAndEC(dataBytes, version, ecl){
    var vi = version - 1;
    var ecPerBlock = EC_CODEWORDS_PER_BLOCK[vi][ecl];
    var numBlocks = NUM_BLOCKS[vi][ecl];
    var dataCW = DATA_CODEWORDS[vi][ecl];

    // Split data into blocks
    var shortBlockLen = Math.floor(dataCW / numBlocks);
    var longBlocks = dataCW % numBlocks;
    var blocks = [];
    var offset = 0;
    for(var i=0;i<numBlocks;i++){
      var len = shortBlockLen + (i >= numBlocks - longBlocks ? 1 : 0);
      blocks.push(dataBytes.slice(offset, offset+len));
      offset += len;
    }

    // RS encode each block
    var ecBlocks = [];
    for(var i=0;i<numBlocks;i++){
      ecBlocks.push(rsEncode(blocks[i], ecPerBlock));
    }

    // Interleave data
    var result = [];
    for(var i=0;i<shortBlockLen;i++){
      for(var b=0;b<numBlocks;b++) result.push(blocks[b][i]);
    }
    if(longBlocks > 0){
      var lastIdx = shortBlockLen;
      for(var b=numBlocks-longBlocks;b<numBlocks;b++) result.push(blocks[b][lastIdx]);
    }

    // Interleave EC
    for(var i=0;i<ecPerBlock;i++){
      for(var b=0;b<numBlocks;b++) result.push(ecBlocks[b][i]);
    }

    return result;
  }

  function createMatrix(version){
    var size = version * 4 + 17;
    var matrix = [];
    var reserved = [];
    for(var i=0;i<size;i++){
      matrix.push(new Array(size).fill(0));
      reserved.push(new Array(size).fill(false));
    }

    // Finder patterns
    function drawFinderPattern(r,c){
      for(var dr=-1;dr<=7;dr++){
        for(var dc=-1;dc<=7;dc++){
          var rr=r+dr, cc=c+dc;
          if(rr<0||rr>=size||cc<0||cc>=size) continue;
          var val = 0;
          if(dr>=0&&dr<=6&&dc>=0&&dc<=6){
            if(dr===0||dr===6||dc===0||dc===6||
              (dr>=2&&dr<=4&&dc>=2&&dc<=4)) val=1;
          }
          matrix[rr][cc]=val;
          reserved[rr][cc]=true;
        }
      }
    }
    drawFinderPattern(0,0);
    drawFinderPattern(0,size-7);
    drawFinderPattern(size-7,0);

    // Timing patterns
    for(var i=8;i<size-8;i++){
      if(!reserved[6][i]){matrix[6][i]=(i%2===0)?1:0;reserved[6][i]=true;}
      if(!reserved[i][6]){matrix[i][6]=(i%2===0)?1:0;reserved[i][6]=true;}
    }

    // Alignment patterns
    var alignPos = ALIGN_POS[version-1];
    if(alignPos.length > 0){
      for(var ar=0;ar<alignPos.length;ar++){
        for(var ac=0;ac<alignPos.length;ac++){
          var r=alignPos[ar], c=alignPos[ac];
          if(reserved[r]&&reserved[r][c]) continue;
          for(var dr=-2;dr<=2;dr++){
            for(var dc=-2;dc<=2;dc++){
              var val=0;
              if(Math.abs(dr)===2||Math.abs(dc)===2||(dr===0&&dc===0)) val=1;
              matrix[r+dr][c+dc]=val;
              reserved[r+dr][c+dc]=true;
            }
          }
        }
      }
    }

    // Dark module
    matrix[size-8][8]=1; reserved[size-8][8]=true;

    // Reserve format info areas
    for(var i=0;i<15;i++){
      if(i<8) reserved[8][i]=true;
      else if(i<9) reserved[8][size-15+i]=true;
      else reserved[8][14-i]=true;
      if(i<8) reserved[i][8]=true;
      else if(i<9) reserved[size-15+i][8]=true;
      else reserved[14-i][8]=true;
    }

    return {matrix:matrix, reserved:reserved, size:size};
  }

  function placeData(matrix, reserved, size, data){
    var bitIdx = 0;
    var upward = true;
    for(var col=size-1;col>=1;col-=2){
      if(col===6) col=5;
      for(var row=0;row<size;row++){
        var r = upward ? (size-1-row) : row;
        for(var dc=0;dc<2;dc++){
          var c = col - dc;
          if(c<0||c>=size) continue;
          if(reserved[r][c]) continue;
          matrix[r][c] = (bitIdx < data.length*8) ? ((data[Math.floor(bitIdx/8)] >> (7-bitIdx%8)) & 1) : 0;
          bitIdx++;
        }
      }
      upward = !upward;
    }
  }

  function applyMask(matrix, reserved, size, maskNum){
    for(var r=0;r<size;r++){
      for(var c=0;c<size;c++){
        if(reserved[r][c]) continue;
        var invert = false;
        switch(maskNum){
          case 0: invert = (r+c)%2===0; break;
          case 1: invert = r%2===0; break;
          case 2: invert = c%3===0; break;
          case 3: invert = (r+c)%3===0; break;
          case 4: invert = (Math.floor(r/2)+Math.floor(c/3))%2===0; break;
          case 5: invert = ((r*c)%2+(r*c)%3)===0; break;
          case 6: invert = ((r*c)%2+(r*c)%3)%2===0; break;
          case 7: invert = ((r+c)%2+(r*c)%3)%2===0; break;
        }
        if(invert) matrix[r][c] ^= 1;
      }
    }
  }

  function writeFormatInfo(matrix, size, ecl, maskNum){
    var fmtIdx = ecl * 8 + maskNum;
    var fmtBits = FORMAT_INFO[fmtIdx];
    var bits = [];
    for(var i=14;i>=0;i--) bits.push((fmtBits>>i)&1);

    // Horizontal
    var positions = [
      [8,0],[8,1],[8,2],[8,3],[8,4],[8,5],[8,7],[8,8],
      [7,8],[5,8],[4,8],[3,8],[2,8],[1,8],[0,8]
    ];
    for(var i=0;i<15;i++){
      matrix[positions[i][0]][positions[i][1]] = bits[i];
    }
    // Also the top-left copies
    var hPos = [size-1,size-2,size-3,size-4,size-5,size-6,size-7,size-8];
    for(var i=0;i<7;i++){
      matrix[8][hPos[i]] = bits[i];
    }
    var vPos = [8,8,8,8,8,8,8,7];
    for(var i=0;i<8;i++){
      matrix[vPos[i]][size-15+i] = bits[14-i] || bits[7-i];
    }
    // Copy
    for(var i=0;i<7;i++){
      matrix[8][size-1-i] = bits[i];
    }
    for(var i=7;i<15;i++){
      matrix[14-(i-7)][8] = bits[i];
    }
  }

  // Simple penalty scoring to pick best mask
  function penalty(matrix, size){
    var score = 0;
    // Rule 1: consecutive same-color in rows/cols
    for(var r=0;r<size;r++){
      var cnt=1;
      for(var c=1;c<size;c++){
        if(matrix[r][c]===matrix[r][c-1]){cnt++;if(cnt===5)score+=3;else if(cnt>5)score++;}
        else cnt=1;
      }
    }
    for(var c=0;c<size;c++){
      var cnt=1;
      for(var r=1;r<size;r++){
        if(matrix[r][c]===matrix[r-1][c]){cnt++;if(cnt===5)score+=3;else if(cnt>5)score++;}
        else cnt=1;
      }
    }
    // Rule 3: finder-like patterns
    for(var r=0;r<size-1;r++){
      for(var c=0;c<size-10;c++){
        var pat=[1,0,1,1,1,0,1,0,0,0,0];
        var match=true;
        for(var k=0;k<11;k++){if(matrix[r][c+k]!==pat[k]&&matrix[r+1][c+k]!==pat[k]){match=false;break;}}
        if(match) score+=40;
      }
    }
    return score;
  }

  function generate(text, ecl){
    ecl = ecl || 0; // L
    // Encode to UTF-8 bytes (simplified - handle ASCII only well)
    var encoder = new TextEncoder();
    var encoded = encoder.encode(text);
    var version = getVersion(encoded.length);
    var dataBytes = encodeData(encoded, version, ecl);

    var finalData = interleaveAndEC(dataBytes, version, ecl);

    var qr = createMatrix(version);
    var matrix = qr.matrix;
    var reserved = qr.reserved;
    var size = qr.size;

    placeData(matrix, reserved, size, finalData);

    // Find best mask
    var bestMask = 0, bestScore = Infinity;
    for(var m=0;m<8;m++){
      var tmp = matrix.map(function(row){return row.slice();});
      applyMask(tmp, reserved, size, m);
      var s = penalty(tmp, size);
      if(s < bestScore){bestScore=s;bestMask=m;}
    }

    applyMask(matrix, reserved, size, bestMask);
    writeFormatInfo(matrix, size, ecl, bestMask);

    return {matrix:matrix, size:size};
  }

  return {generate:generate};
})();

/* ============================================================
   UI Logic
   ============================================================ */

var qrData = null;

function generateQR(){
  var text = document.getElementById('qrInput').value.trim();
  if(!text){
    showToast('请输入内容');
    return;
  }
  var canvasSize = parseInt(document.getElementById('qrSize').value) || 300;
  var canvas = document.getElementById('qrCanvas');
  canvas.width = canvasSize;
  canvas.height = canvasSize;

  try {
    qrData = QRCode.generate(text, 0); // EC level L for max capacity
  } catch(e) {
    showToast('生成失败: ' + e.message);
    return;
  }

  var fg = document.getElementById('fgColor').value;
  var bg = document.getElementById('bgColor').value;
  var ctx = canvas.getContext('2d');
  var size = qrData.size;
  var cellSize = canvasSize / size;

  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvasSize, canvasSize);

  ctx.fillStyle = fg;
  for(var r=0;r<size;r++){
    for(var c=0;c<size;c++){
      if(qrData.matrix[r][c]){
        ctx.fillRect(
          Math.round(c * cellSize),
          Math.round(r * cellSize),
          Math.ceil(cellSize),
          Math.ceil(cellSize)
        );
      }
    }
  }
  showToast('二维码已生成');
}

function downloadQR(){
  if(!qrData){
    showToast('请先生成二维码');
    return;
  }
  var canvas = document.getElementById('qrCanvas');
  var link = document.createElement('a');
  link.download = 'qrcode.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('已开始下载');
}

function showToast(msg){
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(function(){el.classList.remove('show');}, 2000);
}

// Auto-generate on load and on input change
window.addEventListener('DOMContentLoaded', function(){
  generateQR();
  document.getElementById('qrInput').addEventListener('input', debounce(generateQR, 300));
  document.getElementById('fgColor').addEventListener('input', debounce(generateQR, 300));
  document.getElementById('bgColor').addEventListener('input', debounce(generateQR, 300));
  document.getElementById('qrSize').addEventListener('change', generateQR);
});

function debounce(fn, delay){
  var timer;
  return function(){
    clearTimeout(timer);
    timer = setTimeout(fn, delay);
  };
}
</script>
</body>
</html>
